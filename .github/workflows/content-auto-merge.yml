name: Content Auto Merge

on:
  pull_request:
    types:
      - labeled

jobs:
  auto-merge:
    if: |
      github.event.label.name == 'auto-merge' &&
      startsWith(github.event.pull_request.head.ref, 'feature/content-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --squash \
            --delete-branch \
            --repo "${{ github.repository }}"
