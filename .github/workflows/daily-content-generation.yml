name: Daily Content Generation

on:
  schedule:
    - cron: "0 23 * * *" # 毎日 8:00 JST
  workflow_dispatch: # 手動実行用

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set date env
        run: |
          echo "TODAY=$(TZ=Asia/Tokyo date +%Y-%m-%d)" >> $GITHUB_ENV
          echo "BRANCH=feature/content-$(TZ=Asia/Tokyo date +%Y%m%d)" >> $GITHUB_ENV

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create feature branch
        run: |
          git checkout -B "$BRANCH"
          git push origin "$BRANCH" --force

      - name: Read prompt file
        id: prompt
        run: |
          {
            echo 'content<<HEREDOC'
            cat .github/prompts/content-generation.md
            echo 'HEREDOC'
          } >> $GITHUB_OUTPUT

      - name: Generate article with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: ${{ steps.prompt.outputs.content }}
          allowed_tools: "WebFetch,WebSearch,Bash,Edit,MultiEdit,Glob,Grep,LS,Read,Write"
        env:
          TODAY: ${{ env.TODAY }}

      - name: Commit generated article (safety net)
        run: |
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "feat: $TODAY 技術ニュースまとめを追加"
          fi
          COMMIT_COUNT=$(git rev-list origin/main..HEAD --count)
          if [ "$COMMIT_COUNT" -eq 0 ]; then
            echo "ERROR: Claude did not generate any content. No commits to push."
            git status
            exit 1
          fi
          echo "Ready to push $COMMIT_COUNT commit(s)."

      - name: Push commits
        run: git push origin "$BRANCH"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "auto-merge" --color "#0075ca" --description "自動マージ対象" 2>/dev/null || true
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "feat: $TODAY 技術ニュースまとめ" \
            --body "毎日8時の自動生成ワークフローによって作成されました。" \
            --label "auto-merge")
          gh pr merge "$PR_URL" --auto --squash --delete-branch

      - name: Cleanup branch on failure
        if: failure()
        run: git push origin --delete "$BRANCH" || true
